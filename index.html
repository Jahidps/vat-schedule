<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PaymentSave VAT Schedule Generator</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { margin: 0; background: #eef1f5; color: #1f2733;
       font-family: Arial, Helvetica, sans-serif; }
.app { display: flex; gap: 18px; padding: 18px; align-items: flex-start; }
.panel { width: 340px; flex: none; background: #fff; border: 1px solid #dfe4ec;
         border-radius: 8px; padding: 16px; position: sticky; top: 18px; }
.panel h2 { margin: 0 0 12px; font-size: 15px; color: #17479E; }
.seg-toggle { display: flex; border: 1px solid #cdd5e0; border-radius: 6px;
              overflow: hidden; margin-bottom: 14px; }
.seg-toggle button { flex: 1; border: none; padding: 8px; background: #fff;
                     cursor: pointer; font-size: 13px; }
.seg-toggle button.on { background: #16469E; color: #fff; font-weight: bold; }
label { display: block; font-size: 12px; color: #5B6675; margin: 10px 0 3px; }
input, textarea { width: 100%; padding: 7px 8px; border: 1px solid #cdd5e0;
                  border-radius: 5px; font-size: 13px; font-family: inherit; }
textarea { resize: vertical; min-height: 92px; }
.hint { font-size: 11px; color: #8a94a3; margin-top: 3px; }
.btn { width: 100%; margin-top: 16px; padding: 11px; background: #16469E;
       color: #fff; border: none; border-radius: 6px; font-size: 14px;
       font-weight: bold; cursor: pointer; }
.btn:hover { background: #123a85; }
.row2 { display: flex; gap: 8px; }
.row2 > div { flex: 1; }
.interim-only { display: none; }
body.interim .interim-only { display: block; }
body.interim .standard-only { display: none; }

.stage { flex: 1; display: flex; justify-content: center; }
.page { background: #fff; width: 794px; min-height: 1123px; position: relative;
        box-shadow: 0 2px 14px rgba(0,0,0,.15); font-size: 11.3px; }
.wrap { padding: 45px 53px 0; }
.top { display: flex; align-items: center; justify-content: space-between; }
.top img { height: 45px; }
.title { font-size: 23px; font-weight: bold; color: #17479E; letter-spacing: 4px; }
.hr { height: 3px; background: #17479E; margin: 16px 0 21px; }
.cols { display: flex; gap: 29px; align-items: stretch; }
.col { flex: 1; display: flex; flex-direction: column; }
.bar { background: #16469E; color: #fff; font-weight: bold; letter-spacing: 2px;
       padding: 8px 13px; font-size: 11.3px; }
.pbox { border: 1px solid #dfe4ec; border-top: none; padding: 13px 16px; flex: 1; }
.pbox div { line-height: 1.5; }
.kv { display: flex; line-height: 1.6; }
.kv .k { color: #5B6675; width: 132px; flex: none; }
.kv .v.b { font-weight: bold; }
.section { color: #17479E; font-size: 14.6px; font-weight: bold;
           letter-spacing: 1.5px; margin: 26px 0 10px; }
table { width: 100%; border-collapse: collapse; }
thead th { background: #16469E; color: #fff; font-size: 10.6px; font-weight: bold;
           padding: 10px 10px; text-align: left; vertical-align: middle; }
thead th.num { text-align: right; }
tbody td { padding: 9px 10px; border-bottom: 1px solid #e8edf4; }
tbody td.num { text-align: right; }
tbody td.charge { color: #1C63B0; }
.notes { border-left: 3px solid #16469E; padding: 2px 0 2px 18px;
         margin: 24px 0 4px; color: #5B6675; }
.notes p { margin: 8px 0; line-height: 1.45; }
.notes b { color: #1f2733; }
.three { display: flex; gap: 34px; margin-top: 6px; }
.three .h { color: #17479E; font-weight: bold; letter-spacing: 1px;
            border-bottom: 1px solid #dfe4ec; padding-bottom: 6px; margin-bottom: 9px; }
.three .r { line-height: 1.65; }
.three .r .k { color: #5B6675; }
.pfooter { position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
           background: #001F5F; color: #fff; font-size: 11px; }
.pfooter .cyan { position: absolute; left: 0; top: 0; bottom: 0; width: 50%;
                 background: #00AFEF; display: flex; align-items: center; gap: 9px;
                 padding-left: 42px; white-space: nowrap;
                 clip-path: polygon(0 0, calc(100% - 30px) 0, 100% 100%, 0 100%); }
.pfooter .fseg { position: absolute; top: 0; bottom: 0; display: flex;
                 align-items: center; gap: 9px; white-space: nowrap; }
.pfooter .fphone { left: 53%; }
.pfooter .fmail { left: 72%; }
.pfooter svg, .cyan svg { flex: none; }

@media print {
  @page { size: A4; margin: 0; }
  body { background: #fff; }
  .app { padding: 0; display: block; }
  .panel, .no-print { display: none !important; }
  .stage { display: block; }
  .page { box-shadow: none; width: 210mm; min-height: 297mm; }
}
</style></head>
<body class="standard">
<div class="app">
  <div class="panel no-print">
    <h2>VAT Schedule Generator</h2>
    <div class="seg-toggle">
      <button type="button" id="mStd" class="on">Standard</button>
      <button type="button" id="mInt">Interim</button>
    </div>

    <label>Bill To (one line each; UK added automatically)</label>
    <textarea id="billto">STEVIE DUNCAN J CAMERON
1469 Wimborne Road
Holmfirth
RM7 7HL</textarea>

    <label class="standard-only">Invoice Number</label>
    <input class="standard-only" id="invno" value="PS-2102186883">

    <label>Agreement No.</label>
    <input id="agrno" value="PS-134326-001">

    <label>Invoice Date (defaults to today, editable)</label>
    <input id="invdate">

    <label>Asset Type</label>
    <input id="asset" value="Card Payment Terminal (POS)">

    <label>VAT Reg. No.</label>
    <input id="vatreg" value="265371690">

    <label>Charge Type</label>
    <input id="charge" value="MONTHLY PAYMENT">

    <label class="standard-only">Tax Point &mdash; Commencement Date</label>
    <input class="standard-only" type="date" id="taxpoint">

    <div class="standard-only">
      <label>Net (&pound;) &mdash; applied to every month</label>
      <input id="net" value="17.99">
      <div class="hint">The Commencement Date is used as the first Tax Point. Rows run monthly to December. VAT (20%), Gross and Period To are calculated.</div>
    </div>

    <div class="interim-only">
      <div class="row2">
        <div><label>Period From (= Tax Point)</label><input type="date" id="ipfrom"></div>
        <div><label>Period To</label><input type="date" id="ipto"></div>
      </div>
      <label>Gross (&pound;) &mdash; you enter this</label>
      <input id="igross" value="20.20">
      <div class="hint">Single row. Tax Point = Period From. VAT is always 20%; Net = Gross &divide; 1.20 and VAT = Gross &minus; Net.</div>
    </div>

    <button type="button" class="btn" id="saveBtn">Save as PDF / Print</button>
  </div>

  <div class="stage"><div class="page" id="page"></div></div>
</div>

var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function pad(n){return (n<10?"0":"")+n;}
function dmy(d){return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function longDate(d){return pad(d.getDate())+" "+MONTHS[d.getMonth()]+" "+d.getFullYear();}
function money(x){return (isNaN(x)?0:x).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseDate(v){ if(!v) return null; var p=v.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
function lastDay(y,m){return new Date(y,m+1,0).getDate();}
function periodTo(tp){ var y=tp.getFullYear(),m=tp.getMonth()+1; if(m>11){y++;m=0;} var day=Math.min(tp.getDate(),lastDay(y,m)); var d=new Date(y,m,day); d.setDate(d.getDate()-1); return d; }
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function setMode(m){
  document.body.className=m;
  document.getElementById("mStd").classList.toggle("on",m==="standard");
  document.getElementById("mInt").classList.toggle("on",m==="interim");
  render();
}

function render(){
  var interim=document.body.className==="interim";
  var g=function(id){return (document.getElementById(id).value||"").trim();};

  var lines=g("billto").split("\n").map(function(s){return s.trim();}).filter(Boolean);
  if(!lines.length||lines[lines.length-1].toLowerCase()!=="united kingdom") lines.push("United Kingdom");
  var bill=lines.map(function(l){return "<div>"+esc(l)+"</div>";}).join("");

  var invdate=g("invdate")||longDate(new Date());
  var inv="";
  function kv(k,v,b){return '<div class="kv"><span class="k">'+k+'</span><span class="v'+(b?" b":"")+'">'+esc(v)+'</span></div>';}
  if(interim){ inv+=kv("Agreement No.",g("agrno"),false); }
  else { inv+=kv("Invoice Number",g("invno"),false); }
  inv+=kv("Invoice Date",invdate,false);
  if(!interim) inv+=kv("Agreement No.",g("agrno"),true);
  inv+=kv("Asset Type",g("asset"),false);
  inv+=kv("VAT Reg. No.",g("vatreg"),false);

  var netHeader=interim?"Net<br>Interim (&pound;)":"Net (&pound;)";
  var rows="";
  if(interim){
    var pf=parseDate(g("ipfrom")), pt=parseDate(g("ipto")); var tp=pf;
    var gross=parseFloat(g("igross")); if(isNaN(gross)) gross=0;
    var inet=Math.round(gross/1.2*100)/100, ivat=Math.round((gross-inet)*100)/100;
    rows='<tr><td class="charge">'+esc(g("charge"))+'</td>'+
         '<td>'+(tp?dmy(tp):"")+'</td><td>'+(pf?dmy(pf):"")+'</td><td>'+(pt?dmy(pt):"")+'</td>'+
         '<td class="num">'+money(inet)+'</td><td class="num">20.00%</td>'+
         '<td class="num">'+money(ivat)+'</td><td class="num">'+money(gross)+'</td></tr>';
  } else {
    var tp0=parseDate(g("taxpoint")); var net=parseFloat(g("net"));
    if(tp0){
      var yr=tp0.getFullYear();
      for(var m=tp0.getMonth();m<12;m++){
        var day=Math.min(tp0.getDate(),lastDay(yr,m));
        var tpr=new Date(yr,m,day);
        var vat=Math.round(net*0.2*100)/100, gross2=Math.round((net+vat)*100)/100;
        var alt=((m-tp0.getMonth())%2)?' style="background:#F5F8FC"':'';
        rows+='<tr'+alt+'><td class="charge">'+esc(g("charge"))+'</td>'+
              '<td>'+dmy(tpr)+'</td><td>'+dmy(tpr)+'</td><td>'+dmy(periodTo(tpr))+'</td>'+
              '<td class="num">'+money(net)+'</td><td class="num">20.00%</td>'+
              '<td class="num">'+money(vat)+'</td><td class="num">'+money(gross2)+'</td></tr>';
      }
    }
  }

  document.getElementById("page").innerHTML =
   '<div class="wrap">'+
   '<div class="top"><img src="'+LOGO+'"><div class="title">VAT SCHEDULE</div></div>'+
   '<div class="hr"></div>'+
   '<div class="cols">'+
     '<div class="col"><div class="bar">BILL TO</div><div class="pbox">'+bill+'</div></div>'+
     '<div class="col"><div class="bar">INVOICE DETAILS</div><div class="pbox">'+inv+'</div></div>'+
   '</div>'+
   '<div class="section">PAYMENT SCHEDULE</div>'+
   '<table><thead><tr><th>Charge Type</th><th>Tax Point</th><th>Period<br>From</th><th>Period To</th>'+
   '<th class="num">'+netHeader+'</th><th class="num">VAT<br>Rate</th><th class="num">VAT (&pound;)</th><th class="num">Gross (&pound;)</th></tr></thead>'+
   '<tbody>'+rows+'</tbody></table>'+
   '<div class="notes"><p><b>Please retain this document.</b> This is your VAT invoice within the meaning of VAT regulations. If you are registered for VAT, you may be required to produce this schedule to HM Revenue &amp; Customs in support of any claims or deductions made in your VAT returns.</p>'+
   '<p><b>Payment terms.</b> Invoices are issued in advance and collected by BACS Direct Debit on the tax point date shown. No action is required where a valid Direct Debit instruction is in place.</p></div>'+
   '<div class="section">CONTACT &amp; PAYMENT DETAILS</div>'+
   '<div class="three">'+
     '<div class="col"><div class="h">CUSTOMER SERVICE</div><div class="r"><span class="k">Tel</span> 01634 540 453</div><div class="r"><span class="k">Email</span> support@paymentsave.co.uk</div><div class="r"><span class="k">Hours</span> Mon&ndash;Fri, 9:00&ndash;17:30</div></div>'+
     '<div class="col"><div class="h">MAILING ADDRESS</div><div class="r">Paymentsave (UK) Ltd</div><div class="r">Unit 7 Stanton Gate</div><div class="r">49 Mawney Road</div><div class="r">Romford, Essex, RM7 7HL</div><div class="r">United Kingdom</div></div>'+
     '<div class="col"><div class="h">BILLING NOTES</div><div class="r"><span class="k">Method</span> BACS Direct Debit</div><div class="r"><span class="k">Frequency</span> Monthly, in advance</div><div class="r"><span class="k">VAT Reg.</span> 265371690</div></div>'+
   '</div></div>'+
   '<div class="pfooter"><div class="cyan"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7zm0 9.5A2.5 2.5 0 1112 6.5a2.5 2.5 0 010 5z"/></svg>Unit 7 Stanton Gate, 49 Mawney Road, Essex, RM7 7HL</div>'+
   '<div class="fseg fphone"><svg width="14" height="18" viewBox="0 0 20 26" fill="#fff"><rect x="3" y="1.5" width="14" height="23" rx="3"/><rect x="5" y="4" width="10" height="16.5" rx="1" fill="#001F5F"/><rect x="8" y="2.5" width="4" height="1" rx="0.5" fill="#001F5F"/></svg>01634 540 453</div>'+
   '<div class="fseg fmail"><svg width="21" height="19" viewBox="0 -6 26 30" fill="#fff"><path d="M2 9 L13 16 L24 9 L24 20 a1.6 1.6 0 0 1-1.6 1.6 H3.6 A1.6 1.6 0 0 1 2 20 Z"/><path d="M2 9 L13 2 L24 9" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/><rect x="9" y="-5.5" width="12" height="10" rx="2.6" fill="#fff"/><text x="15" y="1.7" font-size="8" text-anchor="middle" fill="#0b2b6b" font-family="Arial" font-weight="bold">@</text></svg>support@paymentsave.co.uk</div></div>';
}

  var t=new Date();
  document.getElementById("invdate").value=longDate(t);
  document.getElementById("taxpoint").value="2026-07-15";
  document.getElementById("ipfrom").value="2026-06-15";
  document.getElementById("ipto").value="2026-07-14";
  document.getElementById("mStd").addEventListener("click",function(){setMode("standard");});
  document.getElementById("mInt").addEventListener("click",function(){setMode("interim");});
  document.getElementById("saveBtn").addEventListener("click",function(){window.print();});
  document.addEventListener("input",render);
  render();
})();
</script>
